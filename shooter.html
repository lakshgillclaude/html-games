<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Army Assault</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            overflow: hidden;
        }
        canvas {
            border: 3px solid #2d5016;
            box-shadow: 0 0 20px rgba(45, 80, 22, 0.5);
            background: #1a1a1a;
        }
        #gameCanvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game constants
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 600;
        const PLAYER_SPEED = 200;
        const PLAYER_SIZE = 20;
        const BULLET_SPEED = 400;
        const BULLET_SIZE = 4;
        const ENEMY_SIZE = 18;
        const POWERUP_SIZE = 15;
        const SHOOT_COOLDOWN = 200;

        // Game states
        const GAME_STATE = {
            MENU: 'menu',
            PLAYING: 'playing',
            LEVEL_TRANSITION: 'level_transition',
            GAME_OVER: 'game_over'
        };

        // Enemy types
        const ENEMY_TYPE = {
            CHASER: 'chaser',
            SHOOTER: 'shooter',
            CIRCLER: 'circler'
        };

        // PowerUp types
        const POWERUP_TYPE = {
            HEALTH: 'health',
            SPEED: 'speed',
            DAMAGE: 'damage'
        };

        // Game state
        let gameState = GAME_STATE.MENU;
        let keys = {};
        let lastTime = 0;
        let score = 0;
        let level = 1;
        let menuPulse = 0;
        let selectedPowerUp = 0;
        let availablePowerUps = [];

        // Audio context for sound effects
        let audioContext = null;

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(frequency, duration) {
            if (!audioContext) return;

            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = frequency;
            oscillator.type = 'square';

            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        // Player class
        class Player {
            constructor() {
                this.x = CANVAS_WIDTH / 2;
                this.y = CANVAS_HEIGHT / 2;
                this.width = PLAYER_SIZE;
                this.height = PLAYER_SIZE;
                this.speed = PLAYER_SPEED;
                this.health = 100;
                this.maxHealth = 100;
                this.rotation = 0;
                this.shootCooldown = 0;
                this.damage = 10;
                this.powerups = {
                    speed: 0,
                    damage: 0
                };
            }

            update(deltaTime) {
                let dx = 0;
                let dy = 0;

                if (keys['ArrowUp']) dy -= 1;
                if (keys['ArrowDown']) dy += 1;
                if (keys['ArrowLeft']) dx -= 1;
                if (keys['ArrowRight']) dx += 1;

                // Normalize diagonal movement
                if (dx !== 0 && dy !== 0) {
                    dx *= 0.707;
                    dy *= 0.707;
                }

                // Update rotation based on movement
                if (dx !== 0 || dy !== 0) {
                    this.rotation = Math.atan2(dy, dx) + Math.PI / 2;
                }

                // Apply speed powerup
                let currentSpeed = this.speed;
                if (this.powerups.speed > 0) {
                    currentSpeed += 20;
                    this.powerups.speed -= deltaTime;
                }

                // Apply damage powerup
                if (this.powerups.damage > 0) {
                    this.powerups.damage -= deltaTime;
                    this.damage = 15;
                } else {
                    this.damage = 10;
                }

                // Move player
                this.x += dx * currentSpeed * deltaTime;
                this.y += dy * currentSpeed * deltaTime;

                // Keep player in bounds
                this.x = Math.max(this.width / 2, Math.min(CANVAS_WIDTH - this.width / 2, this.x));
                this.y = Math.max(this.height / 2, Math.min(CANVAS_HEIGHT - this.height / 2, this.y));

                // Update shoot cooldown
                if (this.shootCooldown > 0) {
                    this.shootCooldown -= deltaTime * 1000;
                }
            }

            shoot() {
                if (this.shootCooldown <= 0) {
                    bullets.push(new Bullet(this.x, this.y, this.rotation, true, this.damage));
                    this.shootCooldown = SHOOT_COOLDOWN;
                    playSound(300, 0.1);
                }
            }

            takeDamage(amount) {
                this.health -= amount;
                playSound(200, 0.2);
                if (this.health <= 0) {
                    gameState = GAME_STATE.GAME_OVER;
                }
            }

            heal(amount) {
                this.health = Math.min(this.maxHealth, this.health + amount);
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // Body (rectangle)
                ctx.fillStyle = '#2d5016';
                ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);

                // Head (circle)
                ctx.fillStyle = '#3d6026';
                ctx.beginPath();
                ctx.arc(0, -this.height / 2, this.width / 3, 0, Math.PI * 2);
                ctx.fill();

                // Gun barrel
                ctx.fillStyle = '#000';
                ctx.fillRect(-2, -this.height / 2 - 8, 4, 10);

                ctx.restore();
            }
        }

        // Bullet class
        class Bullet {
            constructor(x, y, rotation, isPlayerBullet, damage = 10) {
                this.x = x;
                this.y = y;
                this.rotation = rotation;
                this.speed = BULLET_SPEED;
                this.radius = BULLET_SIZE;
                this.isPlayerBullet = isPlayerBullet;
                this.damage = damage;
                this.alive = true;
            }

            update(deltaTime) {
                this.x += Math.sin(this.rotation) * this.speed * deltaTime;
                this.y -= Math.cos(this.rotation) * this.speed * deltaTime;

                // Remove if out of bounds
                if (this.x < 0 || this.x > CANVAS_WIDTH || this.y < 0 || this.y > CANVAS_HEIGHT) {
                    this.alive = false;
                }
            }

            draw() {
                ctx.fillStyle = this.isPlayerBullet ? '#ffff00' : '#ff0000';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Enemy class
        class Enemy {
            constructor(type, level) {
                this.type = type;
                this.width = ENEMY_SIZE;
                this.height = ENEMY_SIZE;
                this.health = 30 + (level * 5);
                this.maxHealth = this.health;
                this.alive = true;
                this.rotation = 0;
                this.shootCooldown = 0;
                this.circleAngle = Math.random() * Math.PI * 2;

                // Spawn from random edge
                const edge = Math.floor(Math.random() * 4);
                switch (edge) {
                    case 0: // Top
                        this.x = Math.random() * CANVAS_WIDTH;
                        this.y = -this.height;
                        break;
                    case 1: // Right
                        this.x = CANVAS_WIDTH + this.width;
                        this.y = Math.random() * CANVAS_HEIGHT;
                        break;
                    case 2: // Bottom
                        this.x = Math.random() * CANVAS_WIDTH;
                        this.y = CANVAS_HEIGHT + this.height;
                        break;
                    case 3: // Left
                        this.x = -this.width;
                        this.y = Math.random() * CANVAS_HEIGHT;
                        break;
                }

                // Set speed and color based on type
                switch (this.type) {
                    case ENEMY_TYPE.CHASER:
                        this.speed = 80;
                        this.color = '#cc0000';
                        break;
                    case ENEMY_TYPE.SHOOTER:
                        this.speed = 50;
                        this.color = '#cc00cc';
                        break;
                    case ENEMY_TYPE.CIRCLER:
                        this.speed = 100;
                        this.color = '#ff6600';
                        break;
                }
            }

            update(deltaTime, player) {
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                this.rotation = Math.atan2(dy, dx) + Math.PI / 2;

                switch (this.type) {
                    case ENEMY_TYPE.CHASER:
                        // Move directly toward player
                        if (distance > 0) {
                            this.x += (dx / distance) * this.speed * deltaTime;
                            this.y += (dy / distance) * this.speed * deltaTime;
                        }
                        break;

                    case ENEMY_TYPE.SHOOTER:
                        // Maintain distance and shoot
                        const targetDistance = 175;
                        if (distance > targetDistance + 25) {
                            this.x += (dx / distance) * this.speed * deltaTime;
                            this.y += (dy / distance) * this.speed * deltaTime;
                        } else if (distance < targetDistance - 25) {
                            this.x -= (dx / distance) * this.speed * deltaTime;
                            this.y -= (dy / distance) * this.speed * deltaTime;
                        }

                        // Shoot at player
                        if (this.shootCooldown <= 0) {
                            bullets.push(new Bullet(this.x, this.y, this.rotation, false));
                            this.shootCooldown = 1500;
                        }
                        break;

                    case ENEMY_TYPE.CIRCLER:
                        // Orbit around player
                        const orbitRadius = 150;
                        this.circleAngle += this.speed * deltaTime / 30;
                        const targetX = player.x + Math.cos(this.circleAngle) * orbitRadius;
                        const targetY = player.y + Math.sin(this.circleAngle) * orbitRadius;

                        this.x += (targetX - this.x) * 2 * deltaTime;
                        this.y += (targetY - this.y) * 2 * deltaTime;

                        // Shoot occasionally
                        if (this.shootCooldown <= 0) {
                            bullets.push(new Bullet(this.x, this.y, this.rotation, false));
                            this.shootCooldown = 2000;
                        }
                        break;
                }

                // Update shoot cooldown
                if (this.shootCooldown > 0) {
                    this.shootCooldown -= deltaTime * 1000;
                }
            }

            takeDamage(amount) {
                this.health -= amount;
                if (this.health <= 0) {
                    this.alive = false;
                    score += 10;
                    playSound(100, 0.3);

                    // 20% chance to drop power-up
                    if (Math.random() < 0.2) {
                        const types = [POWERUP_TYPE.HEALTH, POWERUP_TYPE.SPEED, POWERUP_TYPE.DAMAGE];
                        const type = types[Math.floor(Math.random() * types.length)];
                        powerups.push(new PowerUp(this.x, this.y, type));
                    }

                    // Create particle effect
                    for (let i = 0; i < 8; i++) {
                        particles.push(new Particle(this.x, this.y, this.color));
                    }
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // Draw based on type
                ctx.fillStyle = this.color;

                switch (this.type) {
                    case ENEMY_TYPE.CHASER:
                        // Triangle
                        ctx.beginPath();
                        ctx.moveTo(0, -this.height / 2);
                        ctx.lineTo(-this.width / 2, this.height / 2);
                        ctx.lineTo(this.width / 2, this.height / 2);
                        ctx.closePath();
                        ctx.fill();
                        break;

                    case ENEMY_TYPE.SHOOTER:
                        // Pentagon
                        ctx.beginPath();
                        for (let i = 0; i < 5; i++) {
                            const angle = (i * Math.PI * 2 / 5) - Math.PI / 2;
                            const x = Math.cos(angle) * this.width / 2;
                            const y = Math.sin(angle) * this.height / 2;
                            if (i === 0) ctx.moveTo(x, y);
                            else ctx.lineTo(x, y);
                        }
                        ctx.closePath();
                        ctx.fill();
                        break;

                    case ENEMY_TYPE.CIRCLER:
                        // Diamond
                        ctx.beginPath();
                        ctx.moveTo(0, -this.height / 2);
                        ctx.lineTo(this.width / 2, 0);
                        ctx.lineTo(0, this.height / 2);
                        ctx.lineTo(-this.width / 2, 0);
                        ctx.closePath();
                        ctx.fill();
                        break;
                }

                ctx.restore();

                // Health bar
                const barWidth = this.width;
                const barHeight = 3;
                ctx.fillStyle = '#000';
                ctx.fillRect(this.x - barWidth / 2, this.y - this.height / 2 - 8, barWidth, barHeight);
                ctx.fillStyle = '#0f0';
                ctx.fillRect(this.x - barWidth / 2, this.y - this.height / 2 - 8,
                    barWidth * (this.health / this.maxHealth), barHeight);
            }
        }

        // PowerUp class
        class PowerUp {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.size = POWERUP_SIZE;
                this.alive = true;
                this.pulse = 0;
            }

            update(deltaTime) {
                this.pulse += deltaTime * 5;
            }

            draw() {
                const scale = 1 + Math.sin(this.pulse) * 0.2;

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(scale, scale);

                switch (this.type) {
                    case POWERUP_TYPE.HEALTH:
                        // Red cross
                        ctx.fillStyle = '#ff0000';
                        ctx.fillRect(-this.size / 2, -this.size / 6, this.size, this.size / 3);
                        ctx.fillRect(-this.size / 6, -this.size / 2, this.size / 3, this.size);
                        break;

                    case POWERUP_TYPE.SPEED:
                        // Blue arrows
                        ctx.fillStyle = '#00ffff';
                        ctx.beginPath();
                        ctx.moveTo(0, -this.size / 2);
                        ctx.lineTo(-this.size / 3, -this.size / 6);
                        ctx.lineTo(this.size / 3, -this.size / 6);
                        ctx.closePath();
                        ctx.fill();
                        ctx.beginPath();
                        ctx.moveTo(0, this.size / 2);
                        ctx.lineTo(-this.size / 3, this.size / 6);
                        ctx.lineTo(this.size / 3, this.size / 6);
                        ctx.closePath();
                        ctx.fill();
                        break;

                    case POWERUP_TYPE.DAMAGE:
                        // Yellow star
                        ctx.fillStyle = '#ffff00';
                        ctx.beginPath();
                        for (let i = 0; i < 5; i++) {
                            const angle = (i * Math.PI * 2 / 5) - Math.PI / 2;
                            const x = Math.cos(angle) * this.size / 2;
                            const y = Math.sin(angle) * this.size / 2;
                            if (i === 0) ctx.moveTo(x, y);
                            else ctx.lineTo(x, y);

                            const innerAngle = angle + Math.PI / 5;
                            const innerX = Math.cos(innerAngle) * this.size / 4;
                            const innerY = Math.sin(innerAngle) * this.size / 4;
                            ctx.lineTo(innerX, innerY);
                        }
                        ctx.closePath();
                        ctx.fill();
                        break;
                }

                ctx.restore();
            }
        }

        // Particle class
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 200;
                this.vy = (Math.random() - 0.5) * 200;
                this.life = 0.5;
                this.maxLife = 0.5;
                this.color = color;
                this.size = 3;
            }

            update(deltaTime) {
                this.x += this.vx * deltaTime;
                this.y += this.vy * deltaTime;
                this.life -= deltaTime;
            }

            draw() {
                const alpha = this.life / this.maxLife;
                ctx.fillStyle = this.color;
                ctx.globalAlpha = alpha;
                ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
                ctx.globalAlpha = 1;
            }
        }

        // Level Manager
        class LevelManager {
            constructor() {
                this.reset();
            }

            reset() {
                this.enemiesSpawned = 0;
                this.totalEnemies = 10 + (level * 5);
                this.spawnInterval = Math.max(1000, 2000 - level * 100);
                this.enemiesPerWave = Math.min(3 + Math.floor(level / 2), 8);
                this.timeSinceSpawn = 0;
                this.levelComplete = false;
            }

            update(deltaTime) {
                if (this.levelComplete) return;

                this.timeSinceSpawn += deltaTime * 1000;

                if (this.enemiesSpawned < this.totalEnemies && this.timeSinceSpawn >= this.spawnInterval) {
                    this.spawnWave();
                    this.timeSinceSpawn = 0;
                }

                // Check if level is complete
                if (this.enemiesSpawned >= this.totalEnemies && enemies.length === 0) {
                    this.levelComplete = true;
                    level++;
                    generatePowerUpChoices();
                    gameState = GAME_STATE.LEVEL_TRANSITION;
                }
            }

            spawnWave() {
                const enemiesToSpawn = Math.min(this.enemiesPerWave, this.totalEnemies - this.enemiesSpawned);

                for (let i = 0; i < enemiesToSpawn; i++) {
                    let type;
                    if (level < 3) {
                        type = ENEMY_TYPE.CHASER;
                    } else if (level < 5) {
                        type = Math.random() < 0.5 ? ENEMY_TYPE.CHASER : ENEMY_TYPE.SHOOTER;
                    } else {
                        const types = [ENEMY_TYPE.CHASER, ENEMY_TYPE.SHOOTER, ENEMY_TYPE.CIRCLER];
                        type = types[Math.floor(Math.random() * types.length)];
                    }

                    enemies.push(new Enemy(type, level));
                    this.enemiesSpawned++;
                }
            }
        }

        // Game objects
        let player = new Player();
        let bullets = [];
        let enemies = [];
        let powerups = [];
        let particles = [];
        let levelManager = new LevelManager();

        // Collision detection
        function checkCollision(a, b) {
            const aLeft = a.x - (a.width || a.radius || 0) / 2;
            const aRight = a.x + (a.width || a.radius || 0) / 2;
            const aTop = a.y - (a.height || a.radius || 0) / 2;
            const aBottom = a.y + (a.height || a.radius || 0) / 2;

            const bLeft = b.x - (b.width || b.radius || 0) / 2;
            const bRight = b.x + (b.width || b.radius || 0) / 2;
            const bTop = b.y - (b.height || b.radius || 0) / 2;
            const bBottom = b.y + (b.height || b.radius || 0) / 2;

            return aLeft < bRight && aRight > bLeft && aTop < bBottom && aBottom > bTop;
        }

        function generatePowerUpChoices() {
            const types = [POWERUP_TYPE.HEALTH, POWERUP_TYPE.SPEED, POWERUP_TYPE.DAMAGE];
            availablePowerUps = [];
            for (let i = 0; i < 3; i++) {
                availablePowerUps.push(types[Math.floor(Math.random() * types.length)]);
            }
            selectedPowerUp = 0;
        }

        function applyPowerUp(type) {
            playSound(500, 0.2);
            switch (type) {
                case POWERUP_TYPE.HEALTH:
                    player.heal(30);
                    break;
                case POWERUP_TYPE.SPEED:
                    player.powerups.speed = 10;
                    break;
                case POWERUP_TYPE.DAMAGE:
                    player.powerups.damage = 10;
                    break;
            }
        }

        // Update game
        function update(deltaTime) {
            switch (gameState) {
                case GAME_STATE.MENU:
                    menuPulse += deltaTime * 3;
                    break;

                case GAME_STATE.PLAYING:
                    // Update player
                    player.update(deltaTime);

                    // Update bullets
                    bullets.forEach(bullet => bullet.update(deltaTime));
                    bullets = bullets.filter(bullet => bullet.alive);

                    // Update enemies
                    enemies.forEach(enemy => enemy.update(deltaTime, player));
                    enemies = enemies.filter(enemy => enemy.alive);

                    // Update powerups
                    powerups.forEach(powerup => powerup.update(deltaTime));

                    // Update particles
                    particles.forEach(particle => particle.update(deltaTime));
                    particles = particles.filter(particle => particle.life > 0);

                    // Check bullet collisions
                    bullets.forEach(bullet => {
                        if (bullet.isPlayerBullet) {
                            enemies.forEach(enemy => {
                                if (checkCollision(bullet, enemy)) {
                                    enemy.takeDamage(bullet.damage);
                                    bullet.alive = false;
                                }
                            });
                        } else {
                            if (checkCollision(bullet, player)) {
                                player.takeDamage(bullet.damage);
                                bullet.alive = false;
                            }
                        }
                    });

                    // Check enemy-player collisions
                    enemies.forEach(enemy => {
                        if (checkCollision(enemy, player)) {
                            player.takeDamage(0.5);
                        }
                    });

                    // Check powerup collisions
                    powerups.forEach(powerup => {
                        if (checkCollision(powerup, player)) {
                            applyPowerUp(powerup.type);
                            powerup.alive = false;
                        }
                    });
                    powerups = powerups.filter(powerup => powerup.alive);

                    // Update level manager
                    levelManager.update(deltaTime);
                    break;

                case GAME_STATE.LEVEL_TRANSITION:
                    break;

                case GAME_STATE.GAME_OVER:
                    break;
            }
        }

        // Draw game
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // Draw grid
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            for (let x = 0; x < CANVAS_WIDTH; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, CANVAS_HEIGHT);
                ctx.stroke();
            }
            for (let y = 0; y < CANVAS_HEIGHT; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(CANVAS_WIDTH, y);
                ctx.stroke();
            }

            switch (gameState) {
                case GAME_STATE.MENU:
                    drawMenu();
                    break;

                case GAME_STATE.PLAYING:
                    // Draw game objects
                    particles.forEach(particle => particle.draw());
                    powerups.forEach(powerup => powerup.draw());
                    bullets.forEach(bullet => bullet.draw());
                    enemies.forEach(enemy => enemy.draw());
                    player.draw();

                    // Draw HUD
                    drawHUD();
                    break;

                case GAME_STATE.LEVEL_TRANSITION:
                    drawLevelTransition();
                    break;

                case GAME_STATE.GAME_OVER:
                    drawGameOver();
                    break;
            }
        }

        function drawMenu() {
            ctx.fillStyle = '#2d5016';
            ctx.font = 'bold 60px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('ARMY ASSAULT', CANVAS_WIDTH / 2, 150);

            ctx.fillStyle = '#ccc';
            ctx.font = '20px Courier New';
            ctx.fillText('CONTROLS', CANVAS_WIDTH / 2, 250);
            ctx.font = '16px Courier New';
            ctx.fillText('Arrow Keys - Move', CANVAS_WIDTH / 2, 290);
            ctx.fillText('Space Bar - Shoot', CANVAS_WIDTH / 2, 320);

            const pulse = 0.5 + Math.sin(menuPulse) * 0.5;
            ctx.fillStyle = `rgba(45, 80, 22, ${pulse})`;
            ctx.font = 'bold 24px Courier New';
            ctx.fillText('PRESS ENTER TO START', CANVAS_WIDTH / 2, 450);
        }

        function drawHUD() {
            // Health bar
            ctx.fillStyle = '#000';
            ctx.fillRect(10, 10, 200, 20);

            const healthPercent = player.health / player.maxHealth;
            const gradient = ctx.createLinearGradient(10, 10, 210, 10);
            if (healthPercent > 0.5) {
                gradient.addColorStop(0, '#0f0');
                gradient.addColorStop(1, '#ff0');
            } else {
                gradient.addColorStop(0, '#ff0');
                gradient.addColorStop(1, '#f00');
            }
            ctx.fillStyle = gradient;
            ctx.fillRect(10, 10, 200 * healthPercent, 20);

            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(10, 10, 200, 20);

            // Level and score
            ctx.fillStyle = '#fff';
            ctx.font = '18px Courier New';
            ctx.textAlign = 'left';
            ctx.fillText(`Level: ${level}`, 10, 55);
            ctx.fillText(`Score: ${score}`, 10, 78);
            ctx.fillText(`Enemies: ${levelManager.totalEnemies - levelManager.enemiesSpawned + enemies.length}`, 10, 101);

            // Powerup timers
            let yOffset = 130;
            if (player.powerups.speed > 0) {
                ctx.fillStyle = '#00ffff';
                ctx.fillText(`Speed: ${Math.ceil(player.powerups.speed)}s`, 10, yOffset);
                yOffset += 23;
            }
            if (player.powerups.damage > 0) {
                ctx.fillStyle = '#ffff00';
                ctx.fillText(`Damage: ${Math.ceil(player.powerups.damage)}s`, 10, yOffset);
            }
        }

        function drawLevelTransition() {
            // Semi-transparent overlay
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            ctx.fillStyle = '#2d5016';
            ctx.font = 'bold 48px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText(`Level ${level - 1} Complete!`, CANVAS_WIDTH / 2, 150);

            ctx.fillStyle = '#fff';
            ctx.font = '24px Courier New';
            ctx.fillText('Choose a Power-Up:', CANVAS_WIDTH / 2, 220);

            // Draw power-up options
            const startX = CANVAS_WIDTH / 2 - 150;
            availablePowerUps.forEach((type, index) => {
                const x = startX + index * 150;
                const y = 320;

                // Selection box
                if (index === selectedPowerUp) {
                    ctx.strokeStyle = '#2d5016';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(x - 50, y - 50, 100, 100);
                }

                // Power-up icon
                ctx.save();
                ctx.translate(x, y);
                ctx.scale(3, 3);

                switch (type) {
                    case POWERUP_TYPE.HEALTH:
                        ctx.fillStyle = '#ff0000';
                        ctx.fillRect(-5, -1.5, 10, 3);
                        ctx.fillRect(-1.5, -5, 3, 10);
                        break;
                    case POWERUP_TYPE.SPEED:
                        ctx.fillStyle = '#00ffff';
                        ctx.beginPath();
                        ctx.moveTo(0, -5);
                        ctx.lineTo(-3, -1.5);
                        ctx.lineTo(3, -1.5);
                        ctx.closePath();
                        ctx.fill();
                        ctx.beginPath();
                        ctx.moveTo(0, 5);
                        ctx.lineTo(-3, 1.5);
                        ctx.lineTo(3, 1.5);
                        ctx.closePath();
                        ctx.fill();
                        break;
                    case POWERUP_TYPE.DAMAGE:
                        ctx.fillStyle = '#ffff00';
                        ctx.beginPath();
                        for (let i = 0; i < 5; i++) {
                            const angle = (i * Math.PI * 2 / 5) - Math.PI / 2;
                            const x = Math.cos(angle) * 5;
                            const y = Math.sin(angle) * 5;
                            if (i === 0) ctx.moveTo(x, y);
                            else ctx.lineTo(x, y);
                            const innerAngle = angle + Math.PI / 5;
                            const innerX = Math.cos(innerAngle) * 2.5;
                            const innerY = Math.sin(innerAngle) * 2.5;
                            ctx.lineTo(innerX, innerY);
                        }
                        ctx.closePath();
                        ctx.fill();
                        break;
                }

                ctx.restore();

                // Label
                ctx.fillStyle = '#fff';
                ctx.font = '16px Courier New';
                let label = '';
                switch (type) {
                    case POWERUP_TYPE.HEALTH: label = 'Health +30'; break;
                    case POWERUP_TYPE.SPEED: label = 'Speed +20'; break;
                    case POWERUP_TYPE.DAMAGE: label = 'Damage +5'; break;
                }
                ctx.fillText(label, x, y + 65);
            });

            ctx.fillStyle = '#ccc';
            ctx.font = '18px Courier New';
            ctx.fillText('Use Arrow Keys to Select', CANVAS_WIDTH / 2, 480);
            ctx.fillText('Press ENTER to Confirm', CANVAS_WIDTH / 2, 510);
        }

        function drawGameOver() {
            // Semi-transparent overlay
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            ctx.fillStyle = '#cc0000';
            ctx.font = 'bold 72px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, 200);

            ctx.fillStyle = '#fff';
            ctx.font = '32px Courier New';
            ctx.fillText(`Final Score: ${score}`, CANVAS_WIDTH / 2, 300);
            ctx.fillText(`Level Reached: ${level - 1}`, CANVAS_WIDTH / 2, 350);

            ctx.fillStyle = '#ccc';
            ctx.font = '24px Courier New';
            ctx.fillText('PRESS ENTER TO RESTART', CANVAS_WIDTH / 2, 480);
        }

        // Game loop
        function gameLoop(currentTime) {
            const deltaTime = Math.min((currentTime - lastTime) / 1000, 0.1);
            lastTime = currentTime;

            update(deltaTime);
            draw();

            requestAnimationFrame(gameLoop);
        }

        // Input handling
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;

            if (e.key === ' ' && gameState === GAME_STATE.PLAYING) {
                e.preventDefault();
                player.shoot();
            }

            if (e.key === 'Enter') {
                initAudio();

                if (gameState === GAME_STATE.MENU) {
                    gameState = GAME_STATE.PLAYING;
                    resetGame();
                } else if (gameState === GAME_STATE.LEVEL_TRANSITION) {
                    applyPowerUp(availablePowerUps[selectedPowerUp]);
                    gameState = GAME_STATE.PLAYING;
                    levelManager.reset();
                } else if (gameState === GAME_STATE.GAME_OVER) {
                    gameState = GAME_STATE.MENU;
                    level = 1;
                    score = 0;
                }
            }

            if (gameState === GAME_STATE.LEVEL_TRANSITION) {
                if (e.key === 'ArrowLeft') {
                    selectedPowerUp = (selectedPowerUp - 1 + 3) % 3;
                } else if (e.key === 'ArrowRight') {
                    selectedPowerUp = (selectedPowerUp + 1) % 3;
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        function resetGame() {
            player = new Player();
            bullets = [];
            enemies = [];
            powerups = [];
            particles = [];
            levelManager = new LevelManager();
        }

        // Start game loop
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
